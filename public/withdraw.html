<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Withdraw — Reward Arena</title>
  <style>
    :root{--bg:#080b18;--card:rgba(255,255,255,.08);--card2:rgba(255,255,255,.13);--text:#f8fbff;--muted:#aab6d3;--line:rgba(255,255,255,.14);--primary:#7c3cff;--primary2:#00e5ff;--good:#3dff9e;--warn:#ffd166;--bad:#ff5c8a;--shadow:0 22px 80px rgba(0,0,0,.4);--radius:26px}body.light{--bg:#f4f7ff;--card:rgba(255,255,255,.84);--card2:rgba(255,255,255,.96);--text:#121831;--muted:#59627a;--line:rgba(18,24,49,.12);--shadow:0 22px 70px rgba(60,58,138,.16)}*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 18% 10%,rgba(124,60,255,.42),transparent 27%),radial-gradient(circle at 86% 8%,rgba(0,229,255,.30),transparent 24%),var(--bg);min-height:100vh}a{text-decoration:none;color:inherit}.wrap{width:min(1180px,92vw);margin:auto}.nav{display:flex;justify-content:space-between;align-items:center;padding:20px 0}.brand{display:flex;gap:12px;align-items:center;font-weight:950}.logo{width:44px;height:44px;border-radius:15px;background:linear-gradient(135deg,var(--primary),var(--primary2));display:grid;place-items:center;box-shadow:0 0 35px rgba(124,60,255,.55);font-size:22px}.navlinks{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.btn{border:1px solid var(--line);background:var(--card);color:var(--text);padding:12px 15px;border-radius:16px;font-weight:900;cursor:pointer;transition:.18s}.btn:hover{transform:translateY(-2px)}.btn.primary{border:0;background:linear-gradient(135deg,var(--primary),#ff4fd8);box-shadow:0 12px 34px rgba(124,60,255,.35);color:#fff}.btn.bad{border:0;background:linear-gradient(135deg,#ff357c,#ff8a00);color:#fff}.layout{display:grid;grid-template-columns:.85fr 1.15fr;gap:20px;padding:18px 0 60px}.card{border:1px solid var(--line);background:linear-gradient(180deg,var(--card2),rgba(255,255,255,.055));border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);backdrop-filter:blur(16px)}h1{font-size:clamp(30px,4vw,54px);margin:0 0 10px;letter-spacing:-2px}.muted{color:var(--muted);line-height:1.65}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:18px 0}.stat{border:1px solid var(--line);background:rgba(0,0,0,.16);border-radius:22px;padding:16px}.light .stat{background:rgba(255,255,255,.55)}.stat span{color:var(--muted);font-size:13px;font-weight:800}.stat b{display:block;margin-top:7px;font-size:26px}.field{margin:14px 0}.field label{display:block;color:var(--muted);font-weight:800;font-size:13px;margin-bottom:7px}.field input{width:100%;border:1px solid var(--line);outline:0;background:rgba(0,0,0,.18);color:var(--text);padding:15px 16px;border-radius:17px;font-size:16px}.light .field input{background:rgba(255,255,255,.72)}.submit{width:100%;margin-top:10px;padding:16px;border-radius:18px;border:0;color:#fff;background:linear-gradient(135deg,var(--primary),#ff4fd8);font-weight:950;cursor:pointer;font-size:16px}.tablewrap{overflow:auto}.table{width:100%;border-collapse:collapse;min-width:720px}.table th,.table td{text-align:left;padding:13px;border-bottom:1px solid var(--line);font-size:14px}.table th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:rgba(124,60,255,.14);border:1px solid var(--line);font-weight:850}.pending{color:var(--warn)}.approved{color:var(--good)}.rejected{color:var(--bad)}.msg{margin-top:14px;padding:13px;border-radius:16px;border:1px solid var(--line);display:none}.msg.ok{display:block;background:rgba(61,255,158,.1);color:var(--good)}.msg.err{display:block;background:rgba(255,92,138,.1);color:var(--bad)}@media(max-width:900px){.layout{grid-template-columns:1fr}.stats{grid-template-columns:1fr}.table{min-width:640px}}
  </style>
</head>
<body>
<div class="wrap">
  <nav class="nav">
    <a class="brand" href="/dashboard.html"><span class="logo">⚡</span><span>Reward Arena</span></a>
    <div class="navlinks">
      <a class="btn" href="/dashboard.html">🎮 Dashboard</a>
      <button class="btn" id="themeBtn">🌗 Rejim</button>
      <button class="btn bad" id="logoutBtn">Chiqish</button>
    </div>
  </nav>
  <main class="layout">
    <section class="card">
      <h1>Payeer Withdraw</h1>
      <p class="muted">Pul yechish so‘rovi admin panelga yuboriladi. Tasdiqlanguncha summa frozen hold’da turadi.</p>
      <div class="stats">
        <div class="stat"><span>Balance</span><b id="balance">$0.000000</b></div>
        <div class="stat"><span>Frozen</span><b id="frozen">$0.000000</b></div>
      </div>
      <form id="withdrawForm">
        <div class="field"><label>Payeer hisob</label><input name="payeerAccount" placeholder="P123456789 yoki email" required></div>
        <div class="field"><label>Miqdor, USD</label><input name="amount" type="number" min="0.5" step="0.000001" placeholder="0.50" required></div>
        <button class="submit">💳 Pul yechish so‘rovini yuborish</button>
      </form>
      <div class="msg" id="msg"></div>
      <p class="muted" id="minText"></p>
    </section>
    <section class="card">
      <h2 style="margin-top:0">Withdrawal tarixi</h2>
      <div class="tablewrap"><table class="table"><thead><tr><th>Vaqt</th><th>Payeer</th><th>Amount</th><th>Status</th><th>Admin note</th></tr></thead><tbody id="rows"><tr><td colspan="5">Yuklanmoqda...</td></tr></tbody></table></div>
    </section>
  </main>
</div>
<script>
  const $=s=>document.querySelector(s);
  const theme=localStorage.getItem('theme')||'dark'; if(theme==='light') document.body.classList.add('light');
  themeBtn.onclick=()=>{document.body.classList.toggle('light'); localStorage.setItem('theme',document.body.classList.contains('light')?'light':'dark')};
  function fmt(n,d=6){return '$'+Number(n||0).toFixed(d)}
  function dateFmt(x){return new Date(x).toLocaleString()}
  function showMsg(t,ok=false){const m=$('#msg');m.textContent=t;m.className='msg '+(ok?'ok':'err')}
  let me=null, withdrawMin=0.5;
  async function loadMe(){const r=await fetch('/api/me'); if(!r.ok) return location.href='/login.html'; const o=await r.json(); me=o.user; withdrawMin=o.config.withdrawMin||0.5; $('#balance').textContent=fmt(me.balance); $('#frozen').textContent=fmt(me.frozenBalance); $('#minText').textContent=`Minimal withdrawal: $${withdrawMin}`; document.querySelector('[name=amount]').min=withdrawMin; loadWithdrawals();}
  async function loadWithdrawals(){const r=await fetch('/api/withdrawals'); const o=await r.json(); const rows=o.withdrawals||[]; $('#rows').innerHTML=rows.length?rows.map(w=>`<tr><td>${dateFmt(w.createdAt)}</td><td>${w.payeerAccount}</td><td>${fmt(w.amount)}</td><td><span class="pill ${w.status}">${w.status}</span></td><td>${w.adminNote||''}</td></tr>`).join(''):'<tr><td colspan="5">Hali so‘rov yo‘q.</td></tr>'}
  withdrawForm.onsubmit=async e=>{e.preventDefault(); const data=Object.fromEntries(new FormData(withdrawForm)); const r=await fetch('/api/withdrawals',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}); const o=await r.json(); if(!o.ok)return showMsg(o.message||'Xato'); me=o.user; $('#balance').textContent=fmt(me.balance); $('#frozen').textContent=fmt(me.frozenBalance); withdrawForm.reset(); showMsg('So‘rov adminga yuborildi.',true); loadWithdrawals();}
  logoutBtn.onclick=async()=>{await fetch('/api/auth/logout',{method:'POST'}); location.href='/login.html'};
  loadMe();
</script>
</body>
</html>
