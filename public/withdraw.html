<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Withdraw — Reward Arena</title>
  <style>
    :root{--bg:#080b18;--card:rgba(255,255,255,.08);--card2:rgba(255,255,255,.13);--text:#f8fbff;--muted:#aab6d3;--line:rgba(255,255,255,.14);--primary:#7c3cff;--primary2:#00e5ff;--good:#3dff9e;--warn:#ffd166;--bad:#ff5c8a;--shadow:0 22px 80px rgba(0,0,0,.4);--radius:26px}body.light{--bg:#f4f7ff;--card:rgba(255,255,255,.84);--card2:rgba(255,255,255,.96);--text:#121831;--muted:#59627a;--line:rgba(18,24,49,.12);--shadow:0 22px 70px rgba(60,58,138,.16)}*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 18% 10%,rgba(124,60,255,.42),transparent 27%),radial-gradient(circle at 86% 8%,rgba(0,229,255,.30),transparent 24%),var(--bg);min-height:100vh}a{text-decoration:none;color:inherit}.wrap{width:min(1120px,92vw);margin:auto}.nav{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:18px 0}.brand{display:flex;gap:12px;align-items:center;font-weight:950}.logo{width:44px;height:44px;border-radius:15px;background:linear-gradient(135deg,var(--primary),var(--primary2));display:grid;place-items:center;box-shadow:0 0 35px rgba(124,60,255,.55);font-size:22px}.navlinks{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.btn,.select{border:1px solid var(--line);background:var(--card);color:var(--text);padding:12px 16px;border-radius:16px;font-weight:850;cursor:pointer;transition:.18s}.btn:hover{transform:translateY(-2px)}.btn.primary{border:0;background:linear-gradient(135deg,var(--primary),#ff4fd8);box-shadow:0 12px 34px rgba(124,60,255,.35)}.btn.bad{border:0;background:linear-gradient(135deg,#ff477e,var(--bad));color:#fff}.grid{display:grid;grid-template-columns:.85fr 1.15fr;gap:16px;margin:24px 0 40px}.card{border:1px solid var(--line);background:linear-gradient(180deg,var(--card2),rgba(255,255,255,.045));border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);backdrop-filter:blur(16px)}h1{font-size:clamp(32px,5vw,58px);line-height:.95;margin:10px 0 12px}.muted{color:var(--muted);line-height:1.6}.stat{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}.box{border:1px solid var(--line);background:rgba(0,0,0,.14);border-radius:20px;padding:16px}.light .box{background:rgba(255,255,255,.55)}.box b{display:block;font-size:26px;margin-top:6px}.field{margin:14px 0}.field label{display:block;color:var(--muted);font-weight:800;margin-bottom:8px}.field input{width:100%;border:1px solid var(--line);outline:0;background:rgba(0,0,0,.2);color:var(--text);padding:15px 16px;border-radius:17px;font-size:16px}.light .field input{background:rgba(255,255,255,.72)}.tablewrap{overflow:auto}.table{width:100%;border-collapse:collapse;min-width:700px}.table th,.table td{text-align:left;padding:12px;border-bottom:1px solid var(--line);font-size:13px}.table th{color:var(--muted);text-transform:uppercase;font-size:11px;letter-spacing:.08em}.pill{display:inline-flex;padding:6px 10px;border-radius:999px;background:rgba(124,60,255,.15);border:1px solid var(--line);font-weight:850}.pending{color:var(--warn)}.approved{color:var(--good)}.rejected{color:var(--bad)}.toast{position:fixed;right:18px;bottom:18px;border:1px solid var(--line);background:var(--card2);color:var(--text);padding:15px 18px;border-radius:18px;box-shadow:var(--shadow);display:none;z-index:70}.toast.show{display:block}@media(max-width:850px){.grid,.stat{grid-template-columns:1fr}.nav{align-items:flex-start}}
  </style>
</head>
<body>
<div class="wrap">
  <nav class="nav"><a class="brand" href="/dashboard.html"><span class="logo">💸</span><span>Reward Arena</span></a><div class="navlinks"><select class="select" id="langSelect"><option value="en">EN</option><option value="ru">RU</option></select><a class="btn" href="/dashboard.html" data-i18n="dashboard">Dashboard</a><button class="btn" id="themeBtn" data-i18n="theme">🌗 Theme</button><button class="btn bad" id="logoutBtn" data-i18n="logout">Logout</button></div></nav>
  <main class="grid">
    <section class="card"><h1 data-i18n="title">Withdraw to Payeer</h1><p class="muted" data-i18n="lead">Submit a withdrawal request. Funds move to frozen balance until admin approves or rejects the request.</p><div class="stat"><div class="box"><span class="muted" data-i18n="balance">Balance</span><b id="balance">$0.000000</b></div><div class="box"><span class="muted" data-i18n="frozen">Frozen</span><b id="frozen">$0.000000</b></div></div><form id="withdrawForm"><div class="field"><label data-i18n="payeer">Payeer account</label><input id="payeerAccount" placeholder="P1000000000" required></div><div class="field"><label data-i18n="amount">Amount, USD</label><input id="amount" type="number" min="0" step="0.000001" required></div><button class="btn primary" style="width:100%" type="submit" data-i18n="submit">Request withdrawal</button><p class="muted" id="minText"></p></form></section>
    <section class="card"><h2 data-i18n="history">Withdrawal history</h2><div class="tablewrap"><table class="table"><thead><tr><th data-i18n="time">Time</th><th>Payeer</th><th data-i18n="amount">Amount</th><th data-i18n="status">Status</th><th data-i18n="note">Admin note</th></tr></thead><tbody id="rows"><tr><td colspan="5">Loading...</td></tr></tbody></table></div></section>
  </main>
</div><div class="toast" id="toast"></div>
<script>
const dict={en:{dashboard:'Dashboard',theme:'🌗 Theme',logout:'Logout',title:'Withdraw to Payeer',lead:'Submit a withdrawal request. Funds move to frozen balance until admin approves or rejects the request.',balance:'Balance',frozen:'Frozen',payeer:'Payeer account',amount:'Amount, USD',submit:'Request withdrawal',history:'Withdrawal history',time:'Time',status:'Status',note:'Admin note',min:'Minimum withdrawal',empty:'No withdrawal requests yet.'},ru:{dashboard:'Панель',theme:'🌗 Тема',logout:'Выйти',title:'Вывод на Payeer',lead:'Отправьте заявку на вывод. Средства переходят в замороженный баланс до подтверждения или отклонения администратором.',balance:'Баланс',frozen:'Заморожено',payeer:'Payeer аккаунт',amount:'Сумма, USD',submit:'Запросить вывод',history:'История выводов',time:'Время',status:'Статус',note:'Комментарий админа',min:'Минимальный вывод',empty:'Заявок на вывод пока нет.'}};let lang=localStorage.getItem('lang')||'en';langSelect.value=lang;const tr=k=>dict[lang][k]||k;function applyLang(){document.documentElement.lang=lang;document.querySelectorAll('[data-i18n]').forEach(e=>e.textContent=tr(e.dataset.i18n));}langSelect.onchange=()=>{lang=langSelect.value;localStorage.setItem('lang',lang);applyLang();renderMin()};applyLang();
const theme=localStorage.getItem('theme')||'dark';if(theme==='light')document.body.classList.add('light');themeBtn.onclick=()=>{document.body.classList.toggle('light');localStorage.setItem('theme',document.body.classList.contains('light')?'light':'dark')};const $=s=>document.querySelector(s);function fmt(n,d=6){return '$'+Number(n||0).toFixed(d)}function dateFmt(x){return new Date(x).toLocaleString()}function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3200)}let me=null,withdrawMin=.5;
function renderMin(){minText.textContent=`${tr('min')}: ${fmt(withdrawMin,2)}`}
async function load(){const r=await fetch('/api/me');if(!r.ok)return location.href='/login.html';const o=await r.json();me=o.user;withdrawMin=o.config.withdrawMin;balance.textContent=fmt(me.balance);frozen.textContent=fmt(me.frozenBalance);renderMin();loadRows()}
async function loadRows(){const r=await fetch('/api/withdrawals');const o=await r.json();const arr=o.withdrawals||[];rows.innerHTML=arr.length?arr.map(w=>`<tr><td>${dateFmt(w.createdAt)}</td><td>${w.payeerAccount}</td><td>${fmt(w.amount)}</td><td><span class="pill ${w.status}">${w.status}</span></td><td>${w.adminNote||''}</td></tr>`).join(''):`<tr><td colspan="5">${tr('empty')}</td></tr>`}
withdrawForm.onsubmit=async e=>{e.preventDefault();const r=await fetch('/api/withdrawals',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({payeerAccount:payeerAccount.value,amount:Number(amount.value)})});const o=await r.json();if(!o.ok)return toast(o.message||'Error');me=o.user;balance.textContent=fmt(me.balance);frozen.textContent=fmt(me.frozenBalance);withdrawForm.reset();toast(lang==='ru'?'Заявка отправлена':'Request sent');loadRows()};logoutBtn.onclick=async()=>{await fetch('/api/auth/logout',{method:'POST'});location.href='/login.html'};load();
</script>
</body>
</html>
